<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ترابي - متجر الأزياء والإكسسوارات الرجالية الموريتاني">
  <meta name="theme-color" content="#1A1A1A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ترابي">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ترابي | أزياء وإكسسوارات رجالية</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Firebase is initialized entirely from Dart (see lib/main.dart via
       firebase_core) — firebase_core_web loads its own matching JS SDK
       version dynamically at runtime. Do NOT add manual
       <script src="https://www.gstatic.com/firebasejs/...">/firebase.initializeApp()
       tags here: FlutterFire's own package explicitly warns that doing so
       risks a JS SDK version mismatch and duplicate app initialization. -->

  <!-- flutter_bootstrap.js (auto-generated by `flutter build web`) already
       performs the modern init sequence internally:
       _flutter.loader.load(...) -> engineInitializer.initializeEngine(config).
       Do NOT set window.flutterConfiguration here — that's the legacy config
       style, and setting it alongside the modern load() path trips the
       engine's "_usedLegacyConfigStyle" assertion and yields a blank page.
       Note: the HTML renderer has been removed from Flutter as of this SDK
       version, so this build only ships the CanvasKit renderer. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
